<!DOCTYPE html>
<html lang="it" data-tema="chiaro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SetGo — Il tuo tracker di allenamento">
  <title>SetGo</title>

  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

  <!-- ========================================
       SCHELETRO APP — nascosto finché auth non conferma
       ======================================== -->
  <div id="appContenitore" class="app-contenitore" hidden>

    <!-- ========================================
         HEADER FISSO
         ======================================== -->
    <header class="app-header" id="appHeader">
      <div class="header-logo" aria-label="SetGo">
        <svg width="28" height="28" viewBox="0 0 44 44" fill="none" aria-hidden="true" focusable="false">
          <rect x="5"  y="19" width="34" height="6" rx="3" fill="var(--colore-testo)"/>
          <rect x="3"  y="14" width="9"  height="16" rx="2.5" fill="var(--colore-testo)"/>
          <rect x="32" y="14" width="9"  height="16" rx="2.5" fill="var(--colore-testo)"/>
          <rect x="0"  y="17" width="7"  height="10" rx="2" fill="var(--colore-primario)"/>
          <rect x="37" y="17" width="7"  height="10" rx="2" fill="var(--colore-primario)"/>
        </svg>
        <span class="header-logo-testo">SetGo</span>
      </div>

      <button
        id="btnToggleTema"
        class="btn-toggle-tema"
        aria-label="Passa alla modalità scura"
      >
        <i data-lucide="moon" aria-hidden="true"></i>
      </button>
    </header>

    <!-- ========================================
         CONTENUTO PRINCIPALE SCROLLABILE
         ======================================== -->
    <main class="app-main" id="appMain">

      <!-- VISTA HOME -->
      <section id="vistaHome" class="vista vista-attiva" aria-label="Home">

        <!-- Saluto -->
        <div class="home-saluto" id="homeSaluto">
          <span class="skeleton skeleton-testo" style="width:180px; height:1.8rem"></span>
        </div>

        <!-- Cards riassuntive -->
        <div class="home-cards" id="homeCards">

          <!-- Card ultima sessione -->
          <article class="card-info" id="cardUltimaSessione" aria-label="Ultima sessione">
            <div class="card-info-icona">
              <i data-lucide="dumbbell" aria-hidden="true"></i>
            </div>
            <div class="card-info-testo">
              <span class="card-info-etichetta">Ultima sessione</span>
              <span class="card-info-valore" id="valoreUltimaSessione">—</span>
            </div>
          </article>

          <!-- Card streak -->
          <article class="card-info" id="cardStreak" aria-label="Streak attuale">
            <div class="card-info-icona card-info-icona--fuoco">
              <i data-lucide="flame" aria-hidden="true"></i>
            </div>
            <div class="card-info-testo">
              <span class="card-info-etichetta">Streak</span>
              <span class="card-info-valore" id="valoreStreak">0 sett.</span>
            </div>
          </article>

        </div>

        <!-- Mini-calendario 7 giorni -->
        <div class="home-calendario" id="homeCalendario" aria-label="Ultimi 7 giorni di allenamento">
          <p class="calendario-titolo">Ultima settimana</p>
          <div class="calendario-giorni" id="calendarioGiorni" role="list">
            <!-- Generato da app.js -->
          </div>
        </div>

        <!-- Pulsante Inizia Allenamento -->
        <button
          id="btnIniziaAllenamento"
          class="btn-inizia-allenamento"
          aria-label="Inizia un nuovo allenamento"
        >
          <i data-lucide="play-circle" aria-hidden="true"></i>
          <span>Inizia Allenamento</span>
        </button>

      </section>

      <!-- VISTA SCHEDE -->
      <section id="vistaSchede" class="vista vista-schede" aria-label="Le mie schede" hidden>

        <!-- ========================================
             PANEL: LISTA SCHEDE
             ======================================== -->
        <div id="schedePanelLista" class="schede-panel">

          <div class="schede-lista-header">
            <h2 class="sezione-titolo">Le mie schede</h2>
            <button id="btnNuovaScheda" class="btn-nuova-scheda" aria-label="Crea nuova scheda">
              <i data-lucide="plus" aria-hidden="true"></i>
              <span>Nuova</span>
            </button>
          </div>

          <div id="listaSchedePersonali" class="lista-schede" aria-label="Le tue schede"></div>

          <div class="community-header">
            <h3 class="sezione-titolo sezione-titolo--sub">Community</h3>
          </div>
          <div id="listaSchedeCommunity" class="lista-schede" aria-label="Schede della community"></div>

        </div>

        <!-- ========================================
             PANEL: FORM SCHEDA (crea / modifica)
             ======================================== -->
        <div id="schedePanelForm" class="schede-panel" hidden>

          <div class="form-scheda-header">
            <button id="btnTornaListaSchede" class="btn-torna" aria-label="Torna alla lista schede">
              <i data-lucide="arrow-left" aria-hidden="true"></i>
            </button>
            <h2 id="titoloFormScheda" class="sezione-titolo">Nuova Scheda</h2>
          </div>

          <form id="formScheda" class="form-scheda" novalidate>

            <div class="campo-form">
              <label for="inputNomeScheda" class="etichetta-campo">Nome scheda</label>
              <input type="text" id="inputNomeScheda" class="campo-input"
                     placeholder="Es. Push Day, Full Body..." required>
            </div>

            <div class="form-scheda-sezione">
              <p class="etichetta-campo">Esercizi</p>
              <div id="listaEserciziScheda"></div>
              <button type="button" id="btnAggiungiEsercizio" class="btn-aggiungi-esercizio">
                <i data-lucide="plus-circle" aria-hidden="true"></i>
                Aggiungi Esercizio
              </button>
            </div>

            <div id="durataStimata" class="durata-stimata">Durata stimata: —</div>

            <label class="toggle-pubblica">
              <input type="checkbox" id="checkSchedaPubblica">
              <span class="toggle-testo">
                <strong>Scheda pubblica</strong>
                <small>Visibile agli altri utenti nella sezione Community</small>
              </span>
            </label>

            <button type="submit" id="btnSalvaScheda" class="btn-primario">
              Salva Scheda
            </button>

          </form>
        </div>

      </section>

      <!-- VISTA PROGRESSI -->
      <section id="vistaProgressi" class="vista" aria-label="Progressi" hidden>
        <div class="vista-placeholder">
          <i data-lucide="bar-chart-2" aria-hidden="true"></i>
          <p>I progressi arrivano nella Fase 5 📊</p>
        </div>
      </section>

      <!-- VISTA PROFILO -->
      <section id="vistaProfilo" class="vista" aria-label="Profilo" hidden>
        <div class="vista-placeholder">
          <i data-lucide="user-circle" aria-hidden="true"></i>
          <p>Il profilo arriva nella Fase 8 👤</p>
        </div>
      </section>

    </main>

    <!-- ========================================
         NAVIGAZIONE BOTTOM FISSA
         ======================================== -->
    <nav class="nav-bottom" id="navBottom" aria-label="Navigazione principale">
      <button
        class="nav-voce nav-voce--attiva"
        data-vista="Home"
        aria-current="page"
        aria-label="Home"
      >
        <i data-lucide="home" aria-hidden="true"></i>
        <span>Home</span>
      </button>
      <button
        class="nav-voce"
        data-vista="Schede"
        aria-label="Schede"
      >
        <i data-lucide="clipboard-list" aria-hidden="true"></i>
        <span>Schede</span>
      </button>
      <button
        class="nav-voce"
        data-vista="Progressi"
        aria-label="Progressi"
      >
        <i data-lucide="bar-chart-2" aria-hidden="true"></i>
        <span>Progressi</span>
      </button>
      <button
        class="nav-voce"
        data-vista="Profilo"
        aria-label="Profilo"
      >
        <i data-lucide="user" aria-hidden="true"></i>
        <span>Profilo</span>
      </button>
    </nav>

  </div><!-- fine appContenitore -->


  <!-- ========================================
       OVERLAY — sfondo scuro per bottom sheet
       ======================================== -->
  <div id="overlayApp" class="overlay-app" hidden aria-hidden="true"></div>

  <!-- ========================================
       BOTTOM SHEET — RICERCA ESERCIZI
       ======================================== -->
  <div id="ricercaEserciziSheet" class="bottom-sheet" hidden
       role="dialog" aria-modal="true" aria-labelledby="titoloRicercaEsercizi">

    <div class="bottom-sheet-handle" aria-hidden="true"></div>

    <div class="bottom-sheet-header">
      <h3 id="titoloRicercaEsercizi" class="sezione-titolo">Aggiungi Esercizio</h3>
      <button id="btnChiudiRicerca" class="btn-chiudi-sheet" aria-label="Chiudi ricerca esercizi">
        <i data-lucide="x" aria-hidden="true"></i>
      </button>
    </div>

    <div class="contenitore-input ricerca-input">
      <i data-lucide="search" class="icona-input" aria-hidden="true"></i>
      <input type="search" id="inputRicercaEsercizio" class="campo-input"
             placeholder="Cerca esercizio (in inglese)..." autocomplete="off">
    </div>

    <div id="risultatiRicerca" class="risultati-ricerca" role="list" aria-live="polite"></div>

    <div class="bottom-sheet-footer">
      <button type="button" id="btnEsercizioPersonalizzato" class="btn-personalizzato">
        <i data-lucide="plus" aria-hidden="true"></i>
        Aggiungi esercizio personalizzato
      </button>

      <!-- Form esercizio personalizzato (nascosto di default) -->
      <form id="formEsercizioPersonalizzato" class="form-personalizzato" hidden novalidate>
        <input type="text" id="inputNomePersonalizzato" class="campo-input"
               placeholder="Nome esercizio" required>
        <input type="text" id="inputMuscoloPersonalizzato" class="campo-input"
               placeholder="Gruppo muscolare (es. Petto)">
        <input type="url" id="inputGifPersonalizzato" class="campo-input"
               placeholder="URL immagine/GIF (opzionale)">
        <div class="form-personalizzato-azioni">
          <button type="button" id="btnAnnullaPersonalizzato" class="btn-secondario">Annulla</button>
          <button type="submit" class="btn-primario">Aggiungi</button>
        </div>
      </form>
    </div>

  </div>

  <script type="module" src="assets/js/app.js"></script>
  <script>document.addEventListener("DOMContentLoaded", () => lucide.createIcons());</script>

</body>
</html>
